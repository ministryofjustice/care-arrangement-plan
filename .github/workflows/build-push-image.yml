name: 'Build & Push Image'

on:
  workflow_call:
    outputs:
      registry:
        description: 'AWS registry where the ECR is located'
        value: ${{ jobs.image_build.outputs.registry }}

jobs:
  image_build:
    name: 'Build'
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.ecr-login.outputs.registry }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: 'Configure AWS credentials'
        uses: aws-actions/configure-aws-credentials@2e454faab91acfe1250b33b97d80ed198a8ce8f6
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: 'Log into ECR'
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076
        id: ecr-login

      - name: 'Build & Push to ECR'
        run: |

          # ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░

          docker image build -t $REGISTRY/$REPOSITORY:node-$IMAGE_TAG .
          docker image push $REGISTRY/$REPOSITORY:node-$IMAGE_TAG

          # ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░

        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
